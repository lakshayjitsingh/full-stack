name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-frontend ./frontend

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-backend ./backend

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/auth-frontend

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/auth-backend